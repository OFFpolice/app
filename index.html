<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OFFpolice | Telegram Hub</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* prevents accidental text selection on tap */
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', 'Helvetica Neue', Roboto, sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            color: white;
            background: #0b0b12;
        }

        .bg-video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }

        .bg-video-container video {
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            object-fit: cover;
        }

        .page-content {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            text-align: center;
        }

        .brand-logo {
            font-size: 4rem;
            font-weight: 800;
            letter-spacing: 4px;
            text-shadow: 0 4px 12px rgba(0, 0, 0, 0.5);
            background: linear-gradient(135deg, #FFF, #FFD166);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.25rem;
        }

        .brand-tagline {
            font-size: 0.9rem;
            opacity: 0.92;
            margin-bottom: 2rem;
            letter-spacing: 1px;
            background: rgba(0, 0, 0, 0.55);
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            display: inline-block;
            font-weight: 500;
        }

        .telegram-links-list {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            width: 100%;
            max-width: 420px;
            margin-bottom: 2.5rem;
        }

        .telegram-link-button {
            background: rgba(15, 15, 22, 0.85);
            border: 1px solid rgba(255, 210, 90, 0.65);
            border-radius: 60px;
            padding: 1rem 1.2rem;
            text-decoration: none;
            color: white;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.35);
            font-size: 1.08rem;
            transition: none;
            cursor: pointer;
        }

        .telegram-link-button:active {
            opacity: 0.8;
        }

        .telegram-link-button i {
            font-size: 1.55rem;
            width: 1.8rem;
            text-align: center;
            color: #FFD966;
        }

        .time-card {
            margin-bottom: 1.8rem;
            background: rgba(0, 0, 0, 0.6);
            padding: 0.7rem 1.5rem;
            border-radius: 56px;
            display: inline-block;
            border: 0.5px solid rgba(255, 200, 100, 0.4);
        }

        .time-label-text {
            font-size: 0.85rem;
            letter-spacing: 1.2px;
            opacity: 0.9;
            font-weight: 500;
        }

        .time-digits {
            font-size: 2.3rem;
            font-weight: 700;
            font-family: 'SF Mono', 'Fira Code', monospace;
            letter-spacing: 3px;
            margin-top: 6px;
            color: #FFE69A;
            text-shadow: 0 2px 6px black;
            line-height: 1.2;
        }

        .featured-slogan {
            font-size: 1.45rem;
            font-weight: 600;
            margin-bottom: 1.2rem;
            background: linear-gradient(135deg, #FFE0A3, #FFB347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        .footer-note {
            margin-top: 0.8rem;
            font-size: 0.85rem;
            max-width: 300px;
            font-style: italic;
            color: #FFE0B5;
            background: rgba(0, 0, 0, 0.5);
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            line-height: 1.4;
            font-weight: 500;
        }

        @media (max-width: 550px) {
            .page-content {
                padding: 1.6rem 1.2rem;
                justify-content: center;
            }
            .brand-logo {
                font-size: 3rem;
                letter-spacing: 3px;
            }
            .time-digits {
                font-size: 1.9rem;
                letter-spacing: 2px;
            }
            .featured-slogan {
                font-size: 1.2rem;
            }
            .telegram-link-button {
                font-size: 1rem;
                padding: 0.85rem 1rem;
                gap: 12px;
            }
            .telegram-link-button i {
                font-size: 1.4rem;
            }
            .brand-tagline {
                font-size: 0.8rem;
            }
            .footer-note {
                font-size: 0.75rem;
                max-width: 280px;
            }
        }

        @media (max-width: 380px) {
            .telegram-link-button {
                font-size: 0.9rem;
                padding: 0.75rem 0.9rem;
            }
            .telegram-link-button i {
                font-size: 1.3rem;
            }
            .time-digits {
                font-size: 1.7rem;
            }
            .brand-logo {
                font-size: 2.6rem;
            }
        }

        @media (max-height: 500px) and (orientation: landscape) {
            .page-content {
                padding: 1rem 1.5rem;
                justify-content: flex-start;
            }
            .telegram-links-list {
                gap: 0.8rem;
                margin-bottom: 1rem;
            }
            .time-card {
                margin-bottom: 0.8rem;
                padding: 0.4rem 1rem;
            }
            .time-digits {
                font-size: 1.5rem;
            }
            .featured-slogan {
                margin-bottom: 0.5rem;
                font-size: 1rem;
            }
            .brand-logo {
                font-size: 2.2rem;
                margin-bottom: 0;
            }
        }

        a, button, div, .telegram-link-button {
            transition: none;
        }
        .telegram-link-button:hover {
            transform: none;
            background: rgba(15, 15, 22, 0.85);
            border-color: rgba(255, 210, 90, 0.65);
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.35);
        }
    </style>
</head>
<body>

<div class="bg-video-container">
    <video autoplay loop muted playsinline preload="metadata" poster="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1920 1080'%3E%3Crect width='100%25' height='100%25' fill='%2312121c'/%3E%3C/svg%3E">
        <source src="https://videotourl.com/videos/1774408888308-289df404-1679-4bd5-b8ca-c802e53cab99.mp4" type="video/mp4">
        Your browser does not support video backgrounds.
    </video>
</div>

<main class="page-content">
    <div class="brand-logo">OFFpolice</div>
    <div class="brand-tagline">Telegram Ecosystem</div>

    <div class="telegram-links-list">
        <a href="https://t.me/TikTokMediaSaveBot/app" target="_blank" rel="noopener noreferrer" class="telegram-link-button">
            <i class="fab fa-tiktok"></i>
            <span>TikTok Media Save</span>
        </a>
        <a href="https://t.me/EpornerSearchBot/app" target="_blank" rel="noopener noreferrer" class="telegram-link-button">
            <i class="fas fa-eye"></i>
            <span>EPORNER Search</span>
        </a>
        <a href="https://t.me/Sound_search_bot" target="_blank" rel="noopener noreferrer" class="telegram-link-button">
            <i class="fas fa-headphones"></i>
            <span>Sound Search</span>
        </a>
        <a href="https://t.me/jisou?start=a_1741564693" target="_blank" rel="noopener noreferrer" class="telegram-link-button">
            <i class="fas fa-search"></i>
            <span>JISOU</span>
        </a>
    </div>

    <div class="time-card">
        <div class="time-label-text">CURRENT TIME</div>
        <div class="time-digits" id="liveClock">--:--</div>
    </div>

    <div class="featured-slogan">✨ Time to watch Telegram ✨</div>

    <div class="footer-note">
        Every tremor of the body is an aftertaste of Telegram
    </div>
</main>

<script>
    (function() {
        const clockElement = document.getElementById('liveClock');
        function updateClock() {
            if (!clockElement) return;
            const now = new Date();
            const hours = now.getHours().toString().padStart(2, '0');
            const minutes = now.getMinutes().toString().padStart(2, '0');
            clockElement.innerText = `${hours}:${minutes}`;
        }
        updateClock();
        setInterval(updateClock, 60000);

        const bgVideo = document.querySelector('.bg-video-container video');
        if (bgVideo) {
            bgVideo.play().catch(() => {
                const tryPlayOnce = () => {
                    bgVideo.play().catch(() => {});
                    document.removeEventListener('click', tryPlayOnce);
                    document.removeEventListener('touchstart', tryPlayOnce);
                };
                document.addEventListener('click', tryPlayOnce, { once: true });
                document.addEventListener('touchstart', tryPlayOnce, { once: true });
            });
        }
    })();
</script>
</body>
</html>
