<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TangXin | Links</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', 'Helvetica Neue', Roboto, sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            color: white;
        }

        /* video background */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }

        .video-background video {
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            object-fit: cover;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(3px);
            z-index: -1;
        }

        .main-content {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            text-align: center;
        }

        .logo {
            font-size: 4rem;
            font-weight: 800;
            letter-spacing: 4px;
            text-shadow: 0 8px 20px rgba(0,0,0,0.4);
            background: linear-gradient(135deg, #FFF, #FFD166);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.25rem;
        }

        .tagline {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-bottom: 2rem;
            letter-spacing: 1px;
            background: rgba(0,0,0,0.4);
            padding: 0.3rem 1rem;
            border-radius: 40px;
            display: inline-block;
        }

        /* Telegram links grid */
        .links-grid {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            width: 100%;
            max-width: 400px;
            margin-bottom: 2.5rem;
        }

        .tg-button {
            background: rgba(20, 20, 30, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 215, 0, 0.5);
            border-radius: 60px;
            padding: 1rem 1.2rem;
            transition: all 0.25s ease;
            text-decoration: none;
            color: white;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            font-size: 1.1rem;
        }

        .tg-button:hover {
            transform: translateY(-3px);
            background: rgba(0, 0, 0, 0.85);
            border-color: #FFD966;
            box-shadow: 0 15px 25px rgba(0,0,0,0.4);
        }

        .tg-button:active {
            transform: scale(0.97);
        }

        .tg-icon {
            font-size: 1.5rem;
        }

        /* time area */
        .time-area {
            margin-bottom: 1.8rem;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(8px);
            padding: 0.6rem 1.2rem;
            border-radius: 48px;
            display: inline-block;
        }
        .time-label {
            font-size: 0.85rem;
            letter-spacing: 1px;
            opacity: 0.9;
        }
        .current-time {
            font-size: 2.2rem;
            font-weight: 700;
            font-family: monospace;
            letter-spacing: 4px;
            margin-top: 5px;
            color: #FFE69A;
            text-shadow: 0 2px 5px black;
        }

        .main-slogan {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #FFE0A3, #FFB347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .help-link {
            margin-bottom: 2rem;
        }
        .install-help {
            background: rgba(30,30,45,0.7);
            padding: 0.5rem 1.5rem;
            border-radius: 40px;
            text-decoration: none;
            color: #FFD966;
            font-size: 0.9rem;
            transition: 0.2s;
            display: inline-block;
            backdrop-filter: blur(4px);
            border: 0.5px solid rgba(255,200,100,0.5);
        }
        .install-help:hover {
            background: rgba(0,0,0,0.7);
            color: #FFE5A3;
            transform: scale(1.02);
        }

        .aftertaste {
            margin-top: 0.5rem;
            font-size: 0.85rem;
            max-width: 320px;
            font-style: italic;
            color: #FFE0B5;
            background: rgba(0,0,0,0.3);
            padding: 0.4rem 1rem;
            border-radius: 30px;
            backdrop-filter: blur(4px);
            line-height: 1.4;
        }

        @media (max-width: 550px) {
            .logo {
                font-size: 3rem;
            }
            .current-time {
                font-size: 1.8rem;
            }
            .main-slogan {
                font-size: 1.2rem;
            }
            .tg-button {
                font-size: 1rem;
                padding: 0.8rem 1rem;
            }
        }
    </style>
</head>
<body>

<div class="video-background">
    <video autoplay loop muted playsinline poster="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1920 1080'%3E%3Crect width='100%25' height='100%25' fill='%231a1a2e'/%3E%3C/svg%3E">
        <source src="https://videotourl.com/videos/1774408888308-289df404-1679-4bd5-b8ca-c802e53cab99.mp4">
        Your browser does not support video background.
    </video>
</div>
<div class="overlay"></div>

<div class="main-content">
    <div class="logo">TangXin</div>
    <div class="tagline">plhxoa251708.top/dp1/index.html?channelCo</div>
    
    <!-- only these 4 telegram links -->
    <div class="links-grid">
        <a href="https://t.me/TikTokMediaSaveBot/app" target="_blank" rel="noopener noreferrer" class="tg-button">
            <span class="tg-icon">🎵</span> TikTok Media Save
        </a>
        <a href="https://t.me/EpornerSearchBot/app" target="_blank" rel="noopener noreferrer" class="tg-button">
            <span class="tg-icon">🔞</span> EPORNER Search
        </a>
        <a href="https://t.me/Sound_search_bot" target="_blank" rel="noopener noreferrer" class="tg-button">
            <span class="tg-icon">🎧</span> Sound Search Bot
        </a>
        <a href="https://t.me/jisou?start=a_1741564693" target="_blank" rel="noopener noreferrer" class="tg-button">
            <span class="tg-icon">🔍</span> JISOU 极搜
        </a>
    </div>

    <div class="time-area">
        <div class="time-label">Current Time</div>
        <div class="current-time" id="liveClock">--:--</div>
    </div>

    <div class="main-slogan">✨ Time to watch TangXin VLOG ✨</div>

    <div class="help-link">
        <a href="#" class="install-help" id="installGuide">❓ Installation failed? Click here for guide</a>
    </div>

    <div class="aftertaste">
        Every tremor of the body is an aftertaste of TangXin
    </div>
</div>

<script>
    (function() {
        function updateClock() {
            const now = new Date();
            let hours = now.getHours().toString().padStart(2, '0');
            let minutes = now.getMinutes().toString().padStart(2, '0');
            document.getElementById('liveClock').innerText = `${hours}:${minutes}`;
        }
        updateClock();
        setInterval(updateClock, 60000);
        
        const helpLink = document.getElementById('installGuide');
        if (helpLink) {
            helpLink.addEventListener('click', (e) => {
                e.preventDefault();
                alert('📲 Installation Guide:\n1. Android: Enable "Unknown sources" in settings\n2. iOS: Trust enterprise certificate: Settings → General → VPN & Device Management → Trust\n3. Still issues? Contact any of the bots above.');
            });
        }
        
        const bgVideo = document.querySelector('.video-background video');
        if (bgVideo) {
            bgVideo.play().catch(() => {
                const tryPlay = () => {
                    bgVideo.play().then(() => {
                        document.removeEventListener('click', tryPlay);
                        document.removeEventListener('touchstart', tryPlay);
                    }).catch(() => {});
                };
                document.addEventListener('click', tryPlay, { once: true });
                document.addEventListener('touchstart', tryPlay, { once: true });
            });
        }
    })();
</script>
</body>
</html>
