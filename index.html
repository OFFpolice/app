<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OFFpolice | Links</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', 'Helvetica Neue', Roboto, sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            color: white;
            background: #0b0b12;
        }

        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }

        .video-container video {
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            object-fit: cover;
        }

        .content {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: clamp(1rem, 6vh, 2.5rem) clamp(1rem, 5vw, 2rem);
            text-align: center;
        }

        .logo {
            font-size: clamp(2.6rem, 12vw, 4.5rem);
            font-weight: 800;
            letter-spacing: clamp(2px, 1vw, 4px);
            text-shadow: 0 4px 12px rgba(0, 0, 0, 0.5);
            background: linear-gradient(135deg, #FFF, #FFD166);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.25rem;
        }

        .tagline {
            font-size: clamp(0.75rem, 3.5vw, 0.95rem);
            opacity: 0.92;
            margin-bottom: clamp(1rem, 4vh, 2rem);
            letter-spacing: 1px;
            background: rgba(0, 0, 0, 0.55);
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            display: inline-block;
            font-weight: 500;
            backdrop-filter: blur(2px);
        }

        .links-list {
            display: flex;
            flex-direction: column;
            gap: clamp(0.9rem, 2.5vh, 1.3rem);
            width: 100%;
            max-width: 480px;
            margin-bottom: clamp(1.5rem, 5vh, 2.8rem);
        }

        .link-button {
            background: rgba(15, 15, 22, 0.85);
            border: 1px solid rgba(255, 210, 90, 0.65);
            border-radius: 60px;
            padding: clamp(0.7rem, 2.2vh, 1rem) clamp(0.9rem, 4vw, 1.5rem);
            text-decoration: none;
            color: white;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(10px, 3vw, 16px);
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.35);
            font-size: clamp(0.85rem, 3.8vw, 1.1rem);
            cursor: pointer;
            transition: 0.05s linear;
            backdrop-filter: blur(2px);
        }

        .link-button:active {
            opacity: 0.8;
            transform: scale(0.98);
        }

        .link-button i {
            font-size: clamp(1.2rem, 5vw, 1.65rem);
            width: 1.8rem;
            text-align: center;
            color: #FFD966;
        }

        .time-card {
            margin-bottom: clamp(1rem, 3vh, 2rem);
            background: rgba(0, 0, 0, 0.6);
            padding: clamp(0.4rem, 1.8vh, 0.8rem) clamp(1rem, 5vw, 2rem);
            border-radius: 56px;
            display: inline-block;
            border: 0.5px solid rgba(255, 200, 100, 0.4);
            backdrop-filter: blur(4px);
        }

        .time-label-text {
            font-size: clamp(0.7rem, 3vw, 0.85rem);
            letter-spacing: 1.2px;
            opacity: 0.9;
            font-weight: 500;
        }

        .time-digits {
            font-size: clamp(1.7rem, 8vw, 2.6rem);
            font-weight: 700;
            font-family: 'SF Mono', 'Fira Code', monospace;
            letter-spacing: clamp(2px, 1vw, 4px);
            margin-top: 6px;
            color: #FFE69A;
            text-shadow: 0 2px 6px black;
            line-height: 1.2;
        }

        .slogan {
            font-size: clamp(1rem, 5vw, 1.5rem);
            font-weight: 600;
            margin-bottom: clamp(0.8rem, 3vh, 1.4rem);
            background: linear-gradient(135deg, #FFE0A3, #FFB347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        .footer {
            margin-top: 0.5rem;
            font-size: clamp(0.7rem, 3vw, 0.9rem);
            max-width: 340px;
            font-style: italic;
            color: #FFE0B5;
            background: rgba(0, 0, 0, 0.5);
            padding: clamp(0.4rem, 1.5vh, 0.7rem) clamp(1rem, 4vw, 1.6rem);
            border-radius: 40px;
            line-height: 1.4;
            font-weight: 500;
            backdrop-filter: blur(2px);
        }

        .content {
            justify-content: center;
        }

        .link-button:hover {
            transform: none;
            background: rgba(15, 15, 22, 0.85);
            border-color: rgba(255, 210, 90, 0.65);
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.35);
        }

        .video-container,
        .video-container video {
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="video-container">
    <video autoplay loop muted playsinline preload="metadata" poster="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1920 1080'%3E%3Crect width='100%25' height='100%25' fill='%2312121c'/%3E%3C/svg%3E">
        <source src="https://videotourl.com/videos/1774408888308-289df404-1679-4bd5-b8ca-c802e53cab99.mp4" type="video/mp4">
        Your browser does not support video backgrounds.
    </video>
</div>

<main class="content">
    <div class="logo">Welcome</div>
    <div class="tagline">Welcome Telegram Family</div>

    <div class="links-list">
        <a href="https://t.me/TikTokMediaSaveBot/app" target="_blank" rel="noopener noreferrer" class="link-button">
            <i class="fab fa-tiktok"></i>
            <span>TikTok Media Save</span>
        </a>
        <a href="https://t.me/EpornerSearchBot/app" target="_blank" rel="noopener noreferrer" class="link-button">
            <i class="fas fa-eye"></i>
            <span>EPORNER Search</span>
        </a>
        <a href="https://t.me/Sound_search_bot" target="_blank" rel="noopener noreferrer" class="link-button">
            <i class="fas fa-headphones"></i>
            <span>Sound Search</span>
        </a>
        <a href="https://t.me/jisou?start=a_1741564693" target="_blank" rel="noopener noreferrer" class="link-button">
            <i class="fas fa-search"></i>
            <span>JISOU</span>
        </a>
    </div>

    <div class="time-card">
        <div class="time-label-text">CURRENT TIME</div>
        <div class="time-digits" id="liveClock">--:--</div>
    </div>

    <div class="slogan">✨ Time to watch Telegram ✨</div>

    <div class="footer">
        Every tremor of the body is an aftertaste of Telegram
    </div>
</main>

<script>
    (function() {
        const clockElement = document.getElementById('liveClock');
        function updateClock() {
            if (!clockElement) return;
            const now = new Date();
            const hours = now.getHours().toString().padStart(2, '0');
            const minutes = now.getMinutes().toString().padStart(2, '0');
            clockElement.innerText = `${hours}:${minutes}`;
        }
        updateClock();
        setInterval(updateClock, 60000);

        const bgVideo = document.querySelector('.video-container video');
        if (bgVideo) {
            const playPromise = bgVideo.play();
            if (playPromise !== undefined) {
                playPromise.catch(() => {
                    const tryPlayOnce = () => {
                        bgVideo.play().catch(() => {});
                        document.removeEventListener('click', tryPlayOnce);
                        document.removeEventListener('touchstart', tryPlayOnce);
                    };
                    document.addEventListener('click', tryPlayOnce, { once: true });
                    document.addEventListener('touchstart', tryPlayOnce, { once: true });
                });
            }
        }
    })();
</script>
</body>
</html>
